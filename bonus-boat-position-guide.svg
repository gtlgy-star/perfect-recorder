    <rect class="label-bg" x="-120" y="42" width="184" height="64" rx="18" />
    <text class="label" x="-28" y="66">3단계</text>
    <text class="coord" x="-28" y="92">x87 y35</text>
  </g>

  <g id="island-4" transform="translate(1408 710)">
    <circle class="ring" r="44" />
    <circle class="marker" r="20" />
    <rect class="label-bg" x="-120" y="42" width="184" height="64" rx="18" />
    <text class="label" x="-28" y="66">4단계</text>
