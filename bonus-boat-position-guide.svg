<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <image href="images/bonus-map-bg.png" x="0" y="0" width="1600" height="1000" preserveAspectRatio="xMidYMid slice" />

  <style>
    .marker {
      fill: rgba(255, 235, 59, 0.92);
      stroke: #1e2a44;
      stroke-width: 6;
    }

    .ring {
      fill: none;
      stroke: rgba(255, 255, 255, 0.86);
      stroke-width: 8;
      stroke-dasharray: 14 10;
    }

    .label-bg {
      fill: rgba(15, 35, 65, 0.86);
      stroke: rgba(255, 255, 255, 0.72);
      stroke-width: 2;
    }

    .label {
      fill: #ffffff;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      font-size: 28px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .coord {
      fill: #fff3a6;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      font-size: 20px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <g id="island-1" transform="translate(512 360)">
    <circle class="ring" r="44" />
    <circle class="marker" r="20" />
    <rect class="label-bg" x="-92" y="42" width="184" height="64" rx="18" />
    <text class="label" y="66">1단계</text>
    <text class="coord" y="92">x32 y36</text>
  </g>

  <g id="island-2" transform="translate(992 270)">
    <circle class="ring" r="44" />
